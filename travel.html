<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel | Yangqi Zhu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <a class="brand" href="index.html">Yangqi Zhu</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="experience.html">Experience</a>
        <a class="active" href="travel.html">Travel</a>
        <a href="projects.html">Projects</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Travel Journal</h1>
      <p>Click a pin to open a place and browse photos with short notes.</p>
    </section>

    <section class="section" style="border-top:none; padding-top: 0;">
      <div class="travel-layout">
        <div id="map" aria-label="Map with travel pins"></div>

        <aside class="travel-panel">
          <h3 id="location-title">Select a pin</h3>
          <div class="travel-meta" id="location-meta">—</div>
          <p id="location-desc">Your selected location notes appear here.</p>
          <div class="gallery" id="gallery"></div>
        </aside>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">© 2026 Yangqi Zhu</div>
  </footer>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="script.js"></script>
</body>
</html>
